<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Building Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87b5d8;
      font: 14px/1.4 system-ui, -apple-system, sans-serif;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #87b5d8;
      color: #1a2a3a;
      font-size: 15px;
      z-index: 2;
      transition: opacity 0.4s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.85);
      color: #2a3a4a;
      font-size: 12px;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }
  </style>
</head>
<body>
  <div id="loading">Loading building…</div>
  <div id="hint">Drag to rotate · Scroll to zoom · Right-drag to pan</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const loadingEl = document.getElementById('loading');

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87b5d8);
    scene.fog = new THREE.Fog(0x87b5d8, 120, 420);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(70, 45, 70);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.maxPolarAngle = Math.PI * 0.49;

    scene.add(new THREE.HemisphereLight(0xddeeff, 0x6a7a5a, 0.75));
    const sun = new THREE.DirectionalLight(0xfff4e0, 1.35);
    sun.position.set(80, 120, 50);
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xb8d4ff, 0.45);
    fill.position.set(-60, 40, -70);
    scene.add(fill);

    const BUILDING_COLORS = {
      grass: new THREE.Color(0x4f8f45),
      road: new THREE.Color(0x2f3134),
      site: new THREE.Color(0x9a9590),
      facade: new THREE.Color(0xd4c4a8),
      glass: new THREE.Color(0x5d9db8),
      helipad: new THREE.Color(0xececec),
      mullions: new THREE.Color(0x6a6662),
      default: new THREE.Color(0xc8bfb0),
    };

    function colorKey(materialName) {
      const name = (materialName || '').toLowerCase();
      if (name.includes('grass')) return 'grass';
      if (name.includes('road')) return 'road';
      if (name.includes('site')) return 'site';
      if (name.includes('glass')) return 'glass';
      if (name.includes('helipad')) return 'helipad';
      if (name.includes('mullion')) return 'mullions';
      if (name.includes('base')) return 'facade';
      return 'default';
    }

    function applyBuildingColors(root) {
      root.traverse((child) => {
        if (!child.isMesh) return;

        const materials = Array.isArray(child.material) ? child.material : [child.material];
        child.material = materials.map((sourceMat) => {
          const mat = sourceMat.clone();
          const key = colorKey(mat.name);
          const color = BUILDING_COLORS[key];

          mat.color.copy(color);
          mat.metalness = key === 'glass' ? 0.85 : key === 'mullions' ? 0.55 : 0.08;
          mat.roughness = key === 'glass' ? 0.08 : key === 'road' ? 0.92 : 0.62;

          if (key === 'glass') {
            mat.transparent = true;
            mat.opacity = 0.55;
          } else {
            mat.transparent = false;
            mat.opacity = 1;
          }

          if (mat.map) mat.map.colorSpace = THREE.SRGBColorSpace;
          mat.needsUpdate = true;
          return mat;
        });

        if (materials.length === 1) child.material = child.material[0];
      });
    }

    function frameModel(object) {
      const box = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const distance = maxDim / (2 * Math.tan((camera.fov * Math.PI) / 360)) * 1.35;

      controls.target.copy(center);
      camera.position.copy(center).add(new THREE.Vector3(distance * 0.75, distance * 0.42, distance * 0.75));
      camera.near = maxDim / 200;
      camera.far = maxDim * 20;
      camera.updateProjectionMatrix();
      controls.update();
    }

    const loader = new GLTFLoader();
    loader.load(
      'model/model2.glb',
      (gltf) => {
        applyBuildingColors(gltf.scene);
        scene.add(gltf.scene);
        frameModel(gltf.scene);
        loadingEl.classList.add('hidden');
      },
      undefined,
      (error) => {
        loadingEl.textContent = 'Failed to load model/model2.glb';
        console.error(error);
      }
    );

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.addEventListener('resize', onResize);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
