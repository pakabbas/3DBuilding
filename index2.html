<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skyline Tower — 3D Showcase</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #161b26;
      --panel2: #1c2230;
      --border: #2a3142;
      --text: #e8ecf4;
      --muted: #8b93a7;
      --accent: #4f8cff;
      --accent-dim: rgba(79, 140, 255, 0.15);
      --success: #3ecf8e;
      --warn: #f5a623;
      --danger: #ef5b5b;
      --sidebar-w: 320px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, sans-serif;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      height: 100%;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
      transition: transform 0.3s ease;
    }

    #sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-header h1 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    #sidebar-header p {
      font-size: 12px;
      color: var(--muted);
    }

    #floor-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .floor-item {
      border: 1px solid transparent;
      border-radius: 8px;
      margin-bottom: 4px;
      overflow: hidden;
    }

    .floor-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      text-align: left;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .floor-btn:hover { background: var(--panel2); }

    .floor-item.active .floor-btn {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .floor-btn .badge {
      font-size: 11px;
      color: var(--muted);
      background: var(--panel2);
      padding: 2px 7px;
      border-radius: 10px;
    }

    .floor-item.active .floor-btn .badge {
      background: rgba(79, 140, 255, 0.2);
      color: var(--accent);
    }

    .unit-list {
      display: none;
      padding: 0 8px 8px;
    }

    .floor-item.open .unit-list { display: block; }

    .unit-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      margin-top: 4px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }

    .unit-btn:hover { border-color: var(--accent); }

    .unit-btn.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .status-available { background: var(--success); }
    .status-reserved { background: var(--warn); }
    .status-sold { background: var(--danger); }

    /* Viewer */
    #viewer-wrap {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--muted);
      z-index: 5;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    #loading.hidden { opacity: 0; }

    #hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    /* Unit detail panel */
    #unit-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 300px;
      max-width: calc(100% - 32px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      z-index: 8;
      transform: translateX(calc(100% + 32px));
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
      max-height: calc(100% - 32px);
      overflow-y: auto;
    }

    #unit-panel.visible {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    #unit-panel .close-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #unit-panel .close-btn:hover { color: var(--text); }

    #unit-panel h2 {
      font-size: 18px;
      margin-bottom: 4px;
      padding-right: 32px;
    }

    #unit-panel .floor-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    #unit-panel .price {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .detail-item {
      background: var(--panel2);
      border-radius: 8px;
      padding: 10px;
    }

    .detail-item .label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .detail-item .value {
      font-size: 15px;
      font-weight: 600;
      margin-top: 2px;
    }

    #unit-panel h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .tag {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
    }

    .status-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
    }

    .status-pill.available { background: rgba(62, 207, 142, 0.15); color: var(--success); }
    .status-pill.reserved { background: rgba(245, 166, 35, 0.15); color: var(--warn); }
    .status-pill.sold { background: rgba(239, 91, 91, 0.15); color: var(--danger); }

    .feature-list {
      list-style: none;
      margin-bottom: 12px;
    }

    .feature-list li {
      padding: 4px 0;
      font-size: 13px;
      color: var(--muted);
    }

    .feature-list li::before {
      content: '✓ ';
      color: var(--accent);
    }

    /* Mobile toggle */
    #sidebar-toggle {
      display: none;
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 12;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 20px;
      align-items: center;
      justify-content: center;
    }

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 9;
    }

    @media (max-width: 768px) {
      :root { --sidebar-w: 100%; }

      #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-100%);
        width: 85%;
        max-width: 340px;
      }

      #sidebar.open { transform: translateX(0); }

      #sidebar-toggle { display: flex; }

      #overlay.visible { display: block; }

      #unit-panel {
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        width: 100%;
        max-width: 100%;
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
      }

      #unit-panel.visible { transform: translateY(0); }

      #hint { display: none; }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1 id="building-name">Skyline Tower</h1>
        <p id="building-tagline">Loading…</p>
      </div>
      <div id="floor-list"></div>
    </aside>

    <div id="viewer-wrap">
      <button id="sidebar-toggle" aria-label="Toggle menu">☰</button>
      <div id="canvas-container"></div>
      <div id="loading">Loading building…</div>
      <div id="hint">Click a floor on the model · Drag to rotate · Scroll to zoom</div>

      <div id="unit-panel">
        <button class="close-btn" id="close-unit" aria-label="Close">×</button>
        <h2 id="unit-name"></h2>
        <p class="floor-label" id="unit-floor"></p>
        <div class="price" id="unit-price"></div>
        <div class="detail-grid">
          <div class="detail-item">
            <div class="label">Area</div>
            <div class="value" id="unit-area"></div>
          </div>
          <div class="detail-item">
            <div class="label">Bedrooms</div>
            <div class="value" id="unit-beds"></div>
          </div>
          <div class="detail-item">
            <div class="label">Bathrooms</div>
            <div class="value" id="unit-baths"></div>
          </div>
          <div class="detail-item">
            <div class="label">Status</div>
            <div class="value"><span class="status-pill" id="unit-status"></span></div>
          </div>
        </div>
        <h3>Amenities</h3>
        <div class="tag-list" id="unit-amenities"></div>
        <h3>Features</h3>
        <ul class="feature-list" id="unit-features"></ul>
      </div>
    </div>
  </div>

  <div id="overlay"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── State ──
    let buildingData = null;
    let selectedFloorId = null;
    let selectedUnitId = null;
    let model = null;
    const meshMap = new Map();       // meshName -> THREE.Mesh[]
    const originalMaterials = new Map();

    const HIGHLIGHT = new THREE.Color(0x4f8cff);
    const DIM = new THREE.Color(0x333333);

    // ── DOM refs ──
    const container = document.getElementById('canvas-container');
    const loadingEl = document.getElementById('loading');
    const floorListEl = document.getElementById('floor-list');
    const unitPanel = document.getElementById('unit-panel');
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebar-toggle');
    const overlay = document.getElementById('overlay');

    // ── Three.js setup ──
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f1117);

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 2000);
    camera.position.set(80, 50, 80);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 20, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const sun = new THREE.DirectionalLight(0xffffff, 1.4);
    sun.position.set(60, 120, 40);
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xb8c8ff, 0.35);
    fill.position.set(-50, 30, -60);
    scene.add(fill);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const clickableMeshes = [];

    // ── Data loading ──
    async function loadData() {
      const res = await fetch('building-data.json');
      buildingData = await res.json();
      document.getElementById('building-name').textContent = buildingData.building.name;
      document.getElementById('building-tagline').textContent =
        `${buildingData.building.totalFloors} floors · ${buildingData.building.totalUnits} units · ${buildingData.building.tagline}`;
      renderFloorList();
    }

    // ── Sidebar: floor list ──
    function renderFloorList() {
      floorListEl.innerHTML = '';
      buildingData.floors.forEach((floor) => {
        const avail = floor.units.filter((u) => u.status === 'available').length;
        const item = document.createElement('div');
        item.className = 'floor-item';
        item.dataset.floorId = floor.id;

        item.innerHTML = `
          <button class="floor-btn">
            <span>${floor.name}</span>
            <span class="badge">${avail} avail</span>
          </button>
          <div class="unit-list"></div>
        `;

        const unitList = item.querySelector('.unit-list');
        floor.units.forEach((unit) => {
          const btn = document.createElement('button');
          btn.className = 'unit-btn';
          btn.dataset.unitId = unit.id;
          btn.innerHTML = `
            <span>${unit.name} — ${unit.price}</span>
            <span class="status-dot status-${unit.status}"></span>
          `;
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            selectUnit(floor.id, unit.id);
          });
          unitList.appendChild(btn);
        });

        item.querySelector('.floor-btn').addEventListener('click', () => {
          selectFloor(floor.id);
        });

        floorListEl.appendChild(item);
      });
    }

    function updateSidebarUI() {
      document.querySelectorAll('.floor-item').forEach((el) => {
        const fid = Number(el.dataset.floorId);
        el.classList.toggle('active', fid === selectedFloorId);
        el.classList.toggle('open', fid === selectedFloorId);
      });
      document.querySelectorAll('.unit-btn').forEach((el) => {
        el.classList.toggle('selected', el.dataset.unitId === selectedUnitId);
      });
    }

    // ── Selection logic ──
    function selectFloor(floorId) {
      selectedFloorId = floorId;
      selectedUnitId = null;
      unitPanel.classList.remove('visible');
      updateSidebarUI();
      highlightMeshesForFloor(floorId);
      scrollFloorIntoView(floorId);
    }

    function selectUnit(floorId, unitId) {
      selectedFloorId = floorId;
      selectedUnitId = unitId;
      updateSidebarUI();
      highlightMeshesForFloor(floorId);
      showUnitDetail(floorId, unitId);
      if (window.innerWidth <= 768) closeSidebar();
    }

    function showUnitDetail(floorId, unitId) {
      const floor = buildingData.floors.find((f) => f.id === floorId);
      const unit = floor.units.find((u) => u.id === unitId);
      if (!unit) return;

      document.getElementById('unit-name').textContent = unit.name;
      document.getElementById('unit-floor').textContent = floor.name;
      document.getElementById('unit-price').textContent = unit.price;
      document.getElementById('unit-area').textContent = unit.area;
      document.getElementById('unit-beds').textContent = unit.bedrooms;
      document.getElementById('unit-baths').textContent = unit.bathrooms;

      const statusEl = document.getElementById('unit-status');
      statusEl.textContent = unit.status;
      statusEl.className = 'status-pill ' + unit.status;

      const amenitiesEl = document.getElementById('unit-amenities');
      amenitiesEl.innerHTML = unit.amenities.map((a) => `<span class="tag">${a}</span>`).join('');

      const featuresEl = document.getElementById('unit-features');
      featuresEl.innerHTML = (unit.features || []).map((f) => `<li>${f}</li>`).join('');

      unitPanel.classList.add('visible');
    }

    function scrollFloorIntoView(floorId) {
      const el = floorListEl.querySelector(`[data-floor-id="${floorId}"]`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── 3D highlight / dim ──
    function storeOriginalMaterial(mesh) {
      if (originalMaterials.has(mesh.uuid)) return;
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      originalMaterials.set(mesh.uuid, mats.map((m) => m.clone()));
    }

    function highlightMeshesForFloor(floorId) {
      const floor = buildingData.floors.find((f) => f.id === floorId);
      if (!floor) return;
      const activeMesh = floor.meshName;

      clickableMeshes.forEach((mesh) => {
        storeOriginalMaterial(mesh);
        const origMats = originalMaterials.get(mesh.uuid);
        const isActive = mesh.name === activeMesh;
        const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];

        mats.forEach((mat, i) => {
          const orig = origMats[i];
          if (isActive) {
            mat.emissive.copy(HIGHLIGHT);
            mat.emissiveIntensity = 0.35;
            mat.opacity = 1;
          } else {
            mat.emissive.set(0x000000);
            mat.emissiveIntensity = 0;
            mat.color.copy(orig.color).lerp(DIM, 0.55);
            mat.opacity = 0.45;
          }
          mat.transparent = !isActive;
          mat.needsUpdate = true;
        });
      });
    }

    function resetHighlights() {
      clickableMeshes.forEach((mesh) => {
        const origMats = originalMaterials.get(mesh.uuid);
        if (!origMats) return;
        if (Array.isArray(mesh.material)) {
          mesh.material = origMats.map((m) => m.clone());
        } else {
          mesh.material = origMats[0].clone();
        }
      });
      selectedFloorId = null;
      selectedUnitId = null;
      unitPanel.classList.remove('visible');
      updateSidebarUI();
    }

    // ── Raycaster click ──
    function onPointerDown(event) {
      if (event.target !== renderer.domElement) return;
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickableMeshes, false);
      if (!hits.length) return;

      const meshName = hits[0].object.name;
      const floors = buildingData.floors.filter((f) => f.meshName === meshName);
      if (!floors.length) return;

      // Pick the first floor for this mesh band, or cycle if already selected
      let target = floors[0];
      if (selectedFloorId) {
        const idx = floors.findIndex((f) => f.id === selectedFloorId);
        if (idx >= 0 && idx < floors.length - 1) target = floors[idx + 1];
        else if (idx === floors.length - 1) target = floors[0];
      }
      selectFloor(target.id);
      if (window.innerWidth <= 768) openSidebar();
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    // ── Model loading ──
    function frameModel(object) {
      const box = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const dist = maxDim / (2 * Math.tan((camera.fov * Math.PI) / 360)) * 1.4;

      controls.target.copy(center);
      camera.position.copy(center).add(new THREE.Vector3(dist * 0.7, dist * 0.45, dist * 0.7));
      camera.near = maxDim / 200;
      camera.far = maxDim * 20;
      camera.updateProjectionMatrix();
      controls.update();
    }

    function setupModel(gltf) {
      model = gltf.scene;
      const floorMeshNames = new Set(buildingData.floors.map((f) => f.meshName));

      model.traverse((child) => {
        if (!child.isMesh) return;
        child.castShadow = false;
        child.receiveShadow = false;

        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach((mat) => {
          if (!mat) return;
          mat.side = THREE.DoubleSide;
          if (mat.map) mat.map.colorSpace = THREE.SRGBColorSpace;
          if (mat.emissiveMap) mat.emissiveMap.colorSpace = THREE.SRGBColorSpace;
          mat.needsUpdate = true;
        });

        if (floorMeshNames.has(child.name)) {
          clickableMeshes.push(child);
          if (!meshMap.has(child.name)) meshMap.set(child.name, []);
          meshMap.get(child.name).push(child);
        }
      });

      scene.add(model);
      frameModel(model);
      loadingEl.classList.add('hidden');
    }

    // ── Mobile sidebar ──
    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('visible');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('visible');
    }

    sidebarToggle.addEventListener('click', () => {
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });
    overlay.addEventListener('click', closeSidebar);
    document.getElementById('close-unit').addEventListener('click', () => {
      unitPanel.classList.remove('visible');
      selectedUnitId = null;
      updateSidebarUI();
    });

    // ── Resize ──
    function onResize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    // ── Init ──
    async function init() {
      await loadData();
      const loader = new GLTFLoader();
      loader.load('model/skyscraper_tower.glb', setupModel, undefined, (err) => {
        loadingEl.textContent = 'Failed to load model.';
        console.error(err);
      });
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    init();
    animate();
  </script>
</body>
</html>
