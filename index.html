<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skyline Tower — Luxury Living</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #fcf5eb;
      --cream-dark: #f3e8d8;
      --gold: #b5935b;
      --gold-light: #d4b483;
      --gold-dim: rgba(181, 147, 91, 0.14);
      --charcoal: #1c1c1c;
      --text: #2a2520;
      --muted: #7a6f63;
      --panel: #fffcf7;
      --panel2: #f8f0e4;
      --border: #e8ddd0;
      --accent: var(--gold);
      --accent-dim: var(--gold-dim);
      --success: #5a7a52;
      --warn: #a67c3a;
      --danger: #9a4a4a;
      --sidebar-w: 340px;
      --header-h: 72px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--cream);
      color: var(--text);
      font: 14px/1.55 'Montserrat', system-ui, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Site header ── */
    #site-header {
      height: var(--header-h);
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 20;
      flex-shrink: 0;
    }

    .header-inner {
      max-width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .header-nav--left { justify-content: flex-start; }
    .header-nav--right { justify-content: flex-end; }

    .header-nav a {
      color: var(--charcoal);
      text-decoration: none;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .header-nav a:hover { color: var(--gold); }

    .brand {
      text-align: center;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .header-phone {
      font-family: 'Montserrat', sans-serif !important;
      font-size: 12px !important;
      letter-spacing: 0.04em;
      color: var(--muted) !important;
    }

    .btn-enquire,
    .btn-gold,
    .btn-dark {
      border: none;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 11px 22px;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-enquire,
    .btn-gold {
      background: var(--gold);
      color: #fff;
    }

    .btn-enquire:hover,
    .btn-gold:hover {
      background: var(--gold-light);
    }

    .btn-dark {
      background: var(--charcoal);
      color: #fff;
    }

    .btn-dark:hover { background: #333; }

    .btn-enquire:active,
    .btn-gold:active,
    .btn-dark:active { transform: scale(0.98); }

    body {
      display: flex;
      flex-direction: column;
    }

    #app {
      display: flex;
      flex: 1;
      min-height: 0;
      width: 100%;
      position: relative;
    }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      height: 100%;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
      transition: transform 0.3s ease;
    }

    #sidebar-header {
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: linear-gradient(180deg, var(--panel) 0%, var(--cream-dark) 100%);
    }

    #sidebar-header h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--charcoal);
      margin-bottom: 6px;
    }

    #sidebar-header p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .sidebar-label {
      padding: 14px 20px 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
    }

    #floor-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px 16px;
    }

    #floor-list::-webkit-scrollbar { width: 5px; }
    #floor-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .floor-item {
      border: 1px solid transparent;
      border-radius: 2px;
      margin-bottom: 2px;
      overflow: hidden;
    }

    .floor-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }

    .floor-btn span:first-child {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px;
      font-weight: 500;
    }

    .floor-btn:hover { background: var(--panel2); }

    .floor-item.active .floor-btn {
      background: var(--gold-dim);
      color: var(--charcoal);
    }

    .floor-btn .badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--panel2);
      padding: 3px 8px;
      border-radius: 2px;
    }

    .floor-item.active .floor-btn .badge {
      background: rgba(181, 147, 91, 0.2);
      color: var(--gold);
    }

    .unit-list {
      display: none;
      padding: 0 8px 8px;
    }

    .floor-item.open .unit-list { display: block; }

    .unit-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      margin-top: 3px;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }

    .unit-btn:hover {
      border-color: var(--gold);
      background: var(--panel2);
    }

    .unit-btn.selected {
      border-color: var(--gold);
      background: var(--gold-dim);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .status-available { background: var(--success); }
    .status-reserved { background: var(--warn); }
    .status-sold { background: var(--danger); }

    /* Viewer */
    #viewer-wrap {
      flex: 1;
      position: relative;
      min-width: 0;
      background: #dce8f0;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    /* Hero overlay on 3D viewer */
    #hero-copy {
      position: absolute;
      left: 40px;
      bottom: 80px;
      max-width: 420px;
      z-index: 6;
      pointer-events: none;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.4s ease, transform 0.4s ease;
      padding: 28px 32px 32px;
      background: linear-gradient(135deg, rgba(28, 28, 28, 0.55) 0%, rgba(28, 28, 28, 0.2) 100%);
      backdrop-filter: blur(6px);
    }

    #hero-copy.hidden {
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
    }

    #hero-copy .hero-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    #hero-copy .hero-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(36px, 5vw, 52px);
      font-weight: 400;
      line-height: 1.1;
      color: #fff;
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.35);
      margin-bottom: 22px;
    }

    #hero-copy .hero-actions {
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: var(--cream);
      color: var(--muted);
      z-index: 20;
      transition: opacity 0.4s;
      pointer-events: auto;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    #loading::after {
      content: '';
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    #hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.75);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.4);
      background: rgba(28, 28, 28, 0.35);
      padding: 6px 14px;
      backdrop-filter: blur(4px);
    }

    /* Zoom controls */
    #zoom-controls {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 7;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #zoom-controls button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      background: rgba(255, 252, 247, 0.94);
      backdrop-filter: blur(8px);
      color: var(--charcoal);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      box-shadow: 0 2px 14px rgba(42, 37, 32, 0.14);
      transition: border-color 0.15s, color 0.15s, transform 0.15s, background 0.15s;
    }

    #zoom-controls button:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: #fff;
    }

    #zoom-controls button:active {
      transform: scale(0.94);
    }

    #zoom-controls button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Unit detail panel */
    #unit-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 320px;
      max-width: calc(100% - 40px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0;
      z-index: 8;
      transform: translateX(calc(-100% - 40px));
      opacity: 0;
      transition: transform 0.35s ease, opacity 0.35s ease;
      pointer-events: none;
      max-height: calc(100% - 40px);
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(42, 37, 32, 0.12);
      display: flex;
      flex-direction: column;
    }

    #unit-panel.visible {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    .unit-panel-header {
      position: relative;
      flex-shrink: 0;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel) 0%, var(--cream-dark) 100%);
    }

    .unit-panel-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .unit-panel-footer {
      flex-shrink: 0;
      display: flex;
      gap: 10px;
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }

    .unit-panel-footer .btn-enquire,
    .unit-panel-footer .btn-view-images {
      flex: 1;
      padding: 11px 12px;
    }

    .btn-view-images {
      border: 1px solid var(--charcoal);
      background: transparent;
      color: var(--charcoal);
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }

    .btn-view-images:hover {
      background: var(--charcoal);
      color: #fff;
    }

    .btn-view-images:active { transform: scale(0.98); }

    .btn-view-images:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #unit-panel .close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }

    #unit-panel .close-btn:hover {
      color: var(--charcoal);
      border-color: var(--gold);
    }

    #unit-panel h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: 4px;
      padding-right: 36px;
    }

    #unit-panel .floor-label {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0;
    }

    #unit-panel .price {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .detail-item {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px;
    }

    .detail-item .label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }

    .detail-item .value {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 18px;
      font-weight: 600;
      margin-top: 4px;
      color: var(--charcoal);
    }

    #unit-panel h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .tag {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 5px 12px;
      font-size: 11px;
      letter-spacing: 0.04em;
    }

    .status-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status-pill.available { background: rgba(90, 122, 82, 0.12); color: var(--success); }
    .status-pill.reserved { background: rgba(166, 124, 58, 0.12); color: var(--warn); }
    .status-pill.sold { background: rgba(154, 74, 74, 0.12); color: var(--danger); }

    .feature-list {
      list-style: none;
      margin-bottom: 12px;
    }

    .feature-list li {
      padding: 5px 0;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .feature-list li:last-child { border-bottom: none; }

    .feature-list li::before {
      content: '— ';
      color: var(--gold);
    }

    /* Images modal */
    #images-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #images-modal.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #images-modal .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(28, 28, 28, 0.72);
    }

    #images-modal .modal-dialog {
      position: relative;
      width: min(760px, 100%);
      max-height: calc(100vh - 40px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      box-shadow: 0 16px 48px rgba(42, 37, 32, 0.22);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #images-modal .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel) 0%, var(--cream-dark) 100%);
    }

    #images-modal .modal-header h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--charcoal);
      margin: 0;
    }

    #images-modal .modal-close {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px;
      height: 32px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      flex-shrink: 0;
    }

    #images-modal .modal-close:hover {
      color: var(--charcoal);
      border-color: var(--gold);
    }

    #images-modal .modal-body {
      overflow-y: auto;
      padding: 18px 22px 22px;
    }

    .images-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .images-grid img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border: 1px solid var(--border);
      border-radius: 2px;
      cursor: zoom-in;
      background: var(--cream);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .images-grid img:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(42, 37, 32, 0.12);
    }

    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(18, 18, 18, 0.92);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #lightbox.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #lightbox img {
      max-width: min(960px, 100%);
      max-height: calc(100vh - 48px);
      object-fit: contain;
      border-radius: 2px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    #lightbox .lightbox-close {
      position: absolute;
      top: 18px;
      right: 18px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 22px;
    }

    /* Mobile floating toggle */
    #sidebar-toggle {
      display: none;
    }

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      top: var(--header-h);
      background: rgba(28, 28, 28, 0.4);
      z-index: 9;
    }

    @media (max-width: 768px) {
      :root { --sidebar-w: 100%; --header-h: 60px; }

      .header-inner {
        grid-template-columns: 1fr auto;
        padding: 0 16px;
      }

      .header-nav--left { display: none; }
      .header-phone { display: none; }

      .brand-name { font-size: 18px; letter-spacing: 0.08em; }

      .btn-enquire {
        padding: 9px 14px;
        font-size: 10px;
      }

      #hero-copy {
        left: 20px;
        bottom: 90px;
        max-width: calc(100% - 40px);
      }

      #hero-copy .hero-title { font-size: 32px; }

      #hero-copy .hero-actions { flex-direction: column; }

      #sidebar {
        position: fixed;
        right: 0;
        left: auto;
        top: var(--header-h);
        height: calc(100% - var(--header-h));
        transform: translateX(100%);
        width: 88%;
        max-width: 360px;
        box-shadow: -4px 0 32px rgba(42, 37, 32, 0.15);
      }

      #sidebar.open { transform: translateX(0); }

      #sidebar-toggle {
        display: flex;
        position: fixed;
        bottom: 22px;
        right: 22px;
        z-index: 12;
        background: var(--gold);
        border: none;
        color: #fff;
        width: 54px;
        height: 54px;
        border-radius: 2px;
        cursor: pointer;
        font-size: 20px;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(181, 147, 91, 0.45);
        transition: transform 0.2s, background 0.2s;
      }

      #sidebar-toggle:active { transform: scale(0.95); }

      #overlay.visible { display: block; }

      #unit-panel {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        max-width: 100%;
        border-radius: 0;
        transform: translateY(100%);
      }

      #unit-panel.visible { transform: translateY(0); }

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── State ──
    let buildingData = null;
    let selectedFloorId = null;
    let selectedUnitId = null;
    let currentUnitImages = [];
    let currentUnitLabel = '';
    let model = null;
    const allMeshes = [];
    const originalMaterials = new Map();
    const floorSlices = [];
    const highlightGroup = new THREE.Group();
    let activeClipPlanes = [];
    const clipPlanes = [
      new THREE.Plane(new THREE.Vector3(0, 1, 0), 0),
      new THREE.Plane(new THREE.Vector3(0, -1, 0), 0),
    ];
    let highlightMats = [];
    const floorHighlight = { floorId: null, unitId: null, blend: 0, targetBlend: 0 };
    let buildingBox = null;
    let heroHideTimer = null;
    const _footprintV = new THREE.Vector3();

    const cameraAnim = {
      active: false,
      startTime: 0,
      duration: 1400,
      fromTarget: new THREE.Vector3(),
      toTarget: new THREE.Vector3(),
      fromPos: new THREE.Vector3(),
      toPos: new THREE.Vector3(),

    const homeView = {
      saved: false,

    };
    const introOrbit = {
      active: false,
      played: false,

      radius: 0,
      height: 0,

    };
    const siteOffset = new THREE.Vector3(0, 0, 0);
    const buildingScale = 1;

    // ── DOM refs ──
    const container = document.getElementById('canvas-container');
    const loadingEl = document.getElementById('loading');
    const floorListEl = document.getElementById('floor-list');
    const unitPanel = document.getElementById('unit-panel');

    // ── Three.js setup ──
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.localClippingEnabled = true;
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    (function createSky() {
      const canvas = document.createElement('canvas');
      canvas.width = 2;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 0, 512);
      grad.addColorStop(0, '#5a8fc4');
      grad.addColorStop(0.35, '#8eb8e0');
      grad.addColorStop(0.65, '#c5dce8');
      grad.addColorStop(1, '#e8eef2');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 2, 512);
      const skyTex = new THREE.CanvasTexture(canvas);
      skyTex.colorSpace = THREE.SRGBColorSpace;
      scene.background = skyTex;
    })();

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 2000);
    camera.position.set(80, 50, 80);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2.05;
    controls.target.set(0, 20, 0);

    scene.add(new THREE.HemisphereLight(0x87ceeb, 0x5a8f3c, 0.55));
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const sun = new THREE.DirectionalLight(0xfff4e0, 1.6);
    sun.position.set(80, 150, 60);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 400;
    sun.shadow.camera.left = -280;
    sun.shadow.camera.right = 280;
    sun.shadow.camera.top = 280;
    sun.shadow.camera.bottom = -280;
    sun.shadow.bias = -0.0005;
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xd4e8ff, 0.25);
    fill.position.set(-50, 40, -70);
    scene.add(fill);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let cloudLayer = null;

    function createCloudTexture() {
      const size = 192;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
      grad.addColorStop(0, 'rgba(255,255,255,0.95)');
      grad.addColorStop(0.45, 'rgba(255,255,255,0.45)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function createCloudCluster(tex) {
      const group = new THREE.Group();
      const mat = new THREE.MeshBasicMaterial({
        map: tex,
        transparent: true,
        depthWrite: false,
        opacity: 0.78,
        side: THREE.DoubleSide,
      });
      const puffs = [
        [0, 0, 0, 18, 10],
        [7, 1.5, 1, 14, 8],
        [-8, -0.8, 0, 16, 9],
        [4, -1.6, -3, 12, 7],
        [-5, 0.6, 4, 13, 7.5],
        [6, 0.2, -5, 11, 6.5],
      ];
      puffs.forEach(([x, y, z, w, h]) => {
        const puff = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
        puff.position.set(x, y, z);
        puff.rotation.z = (Math.random() - 0.5) * 0.15;
        group.add(puff);
      });
      return group;
    }

    function createCloudLayer(cx, cz, groundY, extent) {
      const tex = createCloudTexture();
      const layer = new THREE.Group();
      const count = 22;

      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + (i % 3) * 0.4;
        const dist = extent * (0.35 + (i % 5) * 0.12);
        const cluster = createCloudCluster(tex);
        cluster.position.set(
          cx + Math.cos(angle) * dist,
          groundY + 48 + (i % 4) * 12 + (i % 3) * 5,
          cz + Math.sin(angle) * dist
        );
        cluster.rotation.y = angle + Math.PI / 2;
        const s = 1.35 + (i % 4) * 0.38;
        cluster.scale.set(s, s * 0.88, s);
        cluster.userData.driftX = 0.4 + (i % 5) * 0.15;
        cluster.userData.driftZ = 0.25 + (i % 4) * 0.12;
        cluster.userData.phase = i * 1.7;
        layer.add(cluster);
      }

      return layer;
    }

    function updateClouds(time, dt) {
      if (!cloudLayer) return;
      const t = time * 0.001;
      cloudLayer.children.forEach((cluster) => {
        cluster.position.x += Math.sin(t * cluster.userData.driftX + cluster.userData.phase) * dt * 1.2;
        cluster.position.z += Math.cos(t * cluster.userData.driftZ + cluster.userData.phase) * dt * 0.9;
      });
    }

    function setLoadingStatus(text) {
      loadingEl.textContent = text;
    }

    function loadTexture(url) {
      return new Promise((resolve, reject) => {
        new THREE.TextureLoader().load(url, resolve, undefined, reject);
      });
    }

    function beginExperience() {
      loadingEl.classList.add('hidden');
      setHeroVisible(true);
      startIntroOrbit();
    }

    // ── Data loading ──
    async function loadData() {
      const res = await fetch('building-data.json?v=8');
      buildingData = await res.json();
      const name = buildingData.building.name;
      document.getElementById('building-name').textContent = name;
      document.getElementById('header-building-name').textContent = name;
      document.getElementById('hero-title').textContent = name;
      document.getElementById('building-tagline').textContent =
        `${buildingData.building.totalFloors} floors · ${buildingData.building.totalUnits} units · ${buildingData.building.tagline}`;
      renderFloorList();
    }

    function scheduleHeroAutoHide(delay = 5000) {
      if (heroHideTimer) clearTimeout(heroHideTimer);
      heroHideTimer = setTimeout(() => {
        heroHideTimer = null;
        if (!selectedFloorId) setHeroVisible(false);
      }, delay);
    }

    function setHeroVisible(visible) {
      heroCopy.classList.toggle('hidden', !visible);
      if (heroHideTimer) {
        clearTimeout(heroHideTimer);
        heroHideTimer = null;
      }
      if (visible && !selectedFloorId) scheduleHeroAutoHide();
    }

    // ── Sidebar: floor list ──
    function renderFloorList() {
      floorListEl.innerHTML = '';
      buildingData.floors.forEach((floor) => {
        const avail = floor.units.filter((u) => u.status === 'available').length;
        const item = document.createElement('div');
        item.className = 'floor-item';
        item.dataset.floorId = floor.id;

        item.innerHTML = `
          <button class="floor-btn">
            <span>${floor.name}</span>
            <span class="badge">${avail} avail</span>
          </button>
          <div class="unit-list"></div>
        `;

        const unitList = item.querySelector('.unit-list');
        floor.units.forEach((unit) => {
          const btn = document.createElement('button');
          btn.className = 'unit-btn';
          btn.dataset.unitId = unit.id;
          btn.innerHTML = `
            <span>${unit.name} — ${unit.price}</span>
            <span class="status-dot status-${unit.status}"></span>
          `;
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            selectUnit(floor.id, unit.id);
          });
          unitList.appendChild(btn);
        });

        item.querySelector('.floor-btn').addEventListener('click', () => {
          selectFloor(floor.id);
        });

        floorListEl.appendChild(item);
      });
    }

    function updateSidebarUI() {
      document.querySelectorAll('.floor-item').forEach((el) => {
        const fid = Number(el.dataset.floorId);
        el.classList.toggle('active', fid === selectedFloorId);
        el.classList.toggle('open', fid === selectedFloorId);
      });
      document.querySelectorAll('.unit-btn').forEach((el) => {
        el.classList.toggle('selected', el.dataset.unitId === selectedUnitId);
      });
    }

    // ── Selection logic ──
    function selectFloor(floorId, options = {}) {
      if (selectedFloorId === floorId && !selectedUnitId && !options.force) return;
      selectedFloorId = floorId;
      selectedUnitId = null;
      unitPanel.classList.remove('visible');
      setHeroVisible(!floorId);
      updateSidebarUI();
      setHighlightTargets(floorId, null);
      zoomToFloor(floorId);
      scrollFloorIntoView(floorId);
      if (options.from3D && window.innerWidth <= 768) openSidebar();
    }

    function selectUnit(floorId, unitId) {
      selectedFloorId = floorId;
      selectedUnitId = unitId;
      setHeroVisible(false);
      updateSidebarUI();
      setHighlightTargets(floorId, unitId);
      zoomToFloor(floorId, unitId);
      showUnitDetail(floorId, unitId);
      if (window.innerWidth <= 768) closeSidebar();
    }

    function showUnitDetail(floorId, unitId) {
      const floor = buildingData.floors.find((f) => f.id === floorId);
      const unit = floor.units.find((u) => u.id === unitId);
      if (!unit) return;

      document.getElementById('unit-name').textContent = unit.name;
      document.getElementById('unit-floor').textContent = floor.name;
      document.getElementById('unit-price').textContent = unit.price;
      document.getElementById('unit-area').textContent = unit.area;
      document.getElementById('unit-beds').textContent = unit.bedrooms;
      document.getElementById('unit-baths').textContent = unit.bathrooms;

      const statusEl = document.getElementById('unit-status');
      statusEl.textContent = unit.status;
      statusEl.className = 'status-pill ' + unit.status;

      const amenitiesEl = document.getElementById('unit-amenities');
      amenitiesEl.innerHTML = unit.amenities.map((a) => `<span class="tag">${a}</span>`).join('');

      const featuresEl = document.getElementById('unit-features');
      featuresEl.innerHTML = (unit.features || []).map((f) => `<li>${f}</li>`).join('');

    function openImagesModal() {

      imagesModalTitle.textContent = `${currentUnitLabel} — Images`;
      imagesGallery.innerHTML = currentUnitImages

    function closeImagesModal() {

    function openLightbox(src, alt) {

    }

    function closeLightbox() {
      lightbox.classList.remove('visible');
      lightbox.setAttribute('aria-hidden', 'true');

    }

    function scrollFloorIntoView(floorId) {
      const el = floorListEl.querySelector(`[data-floor-id="${floorId}"]`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Floor slices & per-floor highlight ──
    function storeOriginalMaterial(mesh) {
      if (originalMaterials.has(mesh.uuid)) return;
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      originalMaterials.set(mesh.uuid, mats.map((m) => m.clone()));
    }

    function computeSliceFootprint(yMin, yMax) {
      const box = new THREE.Box3();
      let has = false;

      allMeshes.forEach((mesh) => {
        const geo = mesh.geometry;
        const pos = geo?.attributes?.position;
        if (!pos) return;

        mesh.updateWorldMatrix(true, false);
        const step = pos.count > 10000 ? Math.ceil(pos.count / 10000) : 1;
        for (let i = 0; i < pos.count; i += step) {
          _footprintV.fromBufferAttribute(pos, i).applyMatrix4(mesh.matrixWorld);
          if (_footprintV.y >= yMin && _footprintV.y <= yMax) {
            box.expandByPoint(_footprintV);
            has = true;
          }
        }
      });

      return has && !box.isEmpty() ? box : null;
    }

    function getHighlightYMin(slice) {
      return slice.highlightYMin ?? slice.yMin;
    }

    function pushFloorSlice(floor, yMin, h, box) {
      const highlightInset = floor.id === 1 ? Math.min(h * 0.12, 0.75) : 0;
      floorSlices.push({
        id: floor.id,
        yMin,
        yMax: yMin + h,
        highlightYMin: yMin + highlightInset,
        center: new THREE.Vector3(
          (box.min.x + box.max.x) / 2,
          yMin + h / 2,
          (box.min.z + box.max.z) / 2
        ),
        size: new THREE.Vector3(box.max.x - box.min.x, h, box.max.z - box.min.z),
        footprint: null,
        footprintCenter: null,
        footprintSize: null,
      });
    }

    function cacheFloorFootprints() {
      floorSlices.forEach((slice) => {
        slice.footprint = computeSliceFootprint(slice.yMin, slice.yMax);
        if (slice.footprint) {
          slice.footprintCenter = slice.footprint.getCenter(new THREE.Vector3());
          slice.footprintSize = slice.footprint.getSize(new THREE.Vector3());
          slice.center.copy(slice.footprintCenter);
          slice.size.copy(slice.footprintSize);
        }
      });
    }

    function computeFloorSlices() {
      if (!model) return;
      buildingBox = new THREE.Box3().setFromObject(model);
      const box = buildingBox;
      const totalH = box.max.y - box.min.y;
      const totalWeight = buildingData.floors.reduce((s, f) => s + (f.heightWeight ?? 1), 0);
      const stdH = totalH / totalWeight;

      const bounds = [box.min.y];
      let y = box.min.y;
      buildingData.floors.forEach((floor) => {
        y += totalH * (floor.heightWeight ?? 1) / totalWeight;
        bounds.push(y);
      });
      bounds[bounds.length - 1] = box.max.y;

      for (let i = 3; i < bounds.length - 1; i++) {
        bounds[i] -= stdH * 0.1 * (i - 2);
      }

      floorSlices.length = 0;
      buildingData.floors.forEach((floor, i) => {
        pushFloorSlice(floor, bounds[i], bounds[i + 1] - bounds[i], box);
      });

      cacheFloorFootprints();
    }

    function meshIntersectsSlice(mesh, slice, unitBox = null) {
      const meshBox = new THREE.Box3().setFromObject(mesh);
      if (meshBox.max.y < getHighlightYMin(slice) - 0.05 || meshBox.min.y > slice.yMax + 0.05) return false;

      const region = unitBox || slice.footprint;
      if (!region) return true;

      const overlap = meshBox.clone().intersect(region);
      if (overlap.isEmpty()) return false;

      const overlapSize = overlap.getSize(new THREE.Vector3());
      const overlapArea = Math.max(
        overlapSize.x * overlapSize.y,
        overlapSize.x * overlapSize.z,
        overlapSize.y * overlapSize.z
      );
      return overlapArea > 0.05;
    }

    function getSliceRegionBox(slice) {
      if (slice.footprint) return slice.footprint;
      return new THREE.Box3(
        new THREE.Vector3(
          slice.center.x - slice.size.x / 2,
          slice.yMin,
          slice.center.z - slice.size.z / 2
        ),
        new THREE.Vector3(
          slice.center.x + slice.size.x / 2,
          slice.yMax,
          slice.center.z + slice.size.z / 2
        )
      );
    }

    function getUnitIndex(floorId, unitId) {
      const floor = buildingData.floors.find((f) => f.id === floorId);
      if (!floor) return -1;
      return floor.units.findIndex((u) => u.id === unitId);
    }

    function getUnitBounds(slice, unitIndex) {
      const floorBox = getSliceRegionBox(slice);
      const center = floorBox.getCenter(new THREE.Vector3());
      const yMin = getHighlightYMin(slice);
      const seamPad = 0.25;
      const edgePad = 0.35;
      const unitBox = new THREE.Box3();

      // Units are east/west halves — always split on X (A = east/+X, B = west/-X).
      if (unitIndex <= 0) {
        unitBox.set(
          new THREE.Vector3(center.x - seamPad, yMin, floorBox.min.z),
          new THREE.Vector3(floorBox.max.x + edgePad, slice.yMax, floorBox.max.z)
        );
      } else {
        unitBox.set(
          new THREE.Vector3(floorBox.min.x - edgePad, yMin, floorBox.min.z),
          new THREE.Vector3(center.x + seamPad, slice.yMax, floorBox.max.z)
        );
      }
      return unitBox;
    }

    function buildHighlightClipPlanes(slice, unitBox) {
      const planes = [
        new THREE.Plane(new THREE.Vector3(0, 1, 0), -getHighlightYMin(slice)),
        new THREE.Plane(new THREE.Vector3(0, -1, 0), slice.yMax),
      ];
      if (unitBox) {
        planes.push(new THREE.Plane(new THREE.Vector3(1, 0, 0), -unitBox.min.x));
        planes.push(new THREE.Plane(new THREE.Vector3(-1, 0, 0), unitBox.max.x));
        planes.push(new THREE.Plane(new THREE.Vector3(0, 0, 1), -unitBox.min.z));
        planes.push(new THREE.Plane(new THREE.Vector3(0, 0, -1), unitBox.max.z));
      }
      return planes;
    }

    function addHighlightClone(mesh, mat) {
      mesh.updateWorldMatrix(true, false);
      const hl = mesh.clone(true);
      hl.material = mat;
      hl.renderOrder = 3;
      hl.castShadow = false;
      hl.receiveShadow = false;
      hl.matrix.copy(mesh.matrixWorld);
      hl.matrixAutoUpdate = false;
      highlightGroup.add(hl);
    }

    function rebuildHighlightMeshes(floorId, unitId = null) {
      highlightGroup.clear();
      highlightMats = [];
      activeClipPlanes = [];
      if (!floorId) return;

      const slice = floorSlices.find((s) => s.id === floorId);
      if (!slice) return;

      let unitBox = null;
      if (unitId) {
        const unitIndex = getUnitIndex(floorId, unitId);
        if (unitIndex >= 0) unitBox = getUnitBounds(slice, unitIndex);
      }

      activeClipPlanes = buildHighlightClipPlanes(slice, unitBox);
      clipPlanes[0].copy(activeClipPlanes[0]);
      clipPlanes[1].copy(activeClipPlanes[1]);

      allMeshes.forEach((mesh) => {
        // Include all floor meshes; clip planes cut to the selected half.
        if (!meshIntersectsSlice(mesh, slice, null)) return;

        const mat = new THREE.MeshStandardMaterial({
          color: 0xf0d090,
          emissive: 0xb5935b,
          emissiveIntensity: 0,
          metalness: 0.12,
          roughness: 0.38,
          clippingPlanes: activeClipPlanes,
          clipIntersection: false,
          transparent: true,
          opacity: 0,
          depthWrite: false,
          side: THREE.DoubleSide,
          polygonOffset: true,
          polygonOffsetFactor: -3,
          polygonOffsetUnits: -3,
        });
        highlightMats.push(mat);
        addHighlightClone(mesh, mat);
      });
    }

    function setHighlightTargets(floorId, unitId = null) {
      floorHighlight.floorId = floorId;
      floorHighlight.unitId = unitId;
      floorHighlight.targetBlend = floorId ? 1 : 0;
      rebuildHighlightMeshes(floorId, unitId);
    }

    function updateHighlightAnimation(dt) {
      const speed = 4;
      floorHighlight.blend += (floorHighlight.targetBlend - floorHighlight.blend) * Math.min(1, speed * dt);
      const b = floorHighlight.blend;

      highlightMats.forEach((mat) => {
        mat.opacity = 0.72 * b;
        mat.emissiveIntensity = 0.65 * b;
        mat.needsUpdate = true;
      });
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function getUnitFocusPoint(floorId, unitId) {
      const slice = floorSlices.find((s) => s.id === floorId);
      if (!slice) return null;
      const unitIndex = getUnitIndex(floorId, unitId);
      if (unitIndex < 0) return null;
      const unitBox = getUnitBounds(slice, unitIndex);
      return {
        center: unitBox.getCenter(new THREE.Vector3()),
        size: unitBox.getSize(new THREE.Vector3()),
      };
    }

    function getFloorFocusPoint(floorId) {
      const slice = floorSlices.find((s) => s.id === floorId);
      if (!slice) return null;
      if (slice.footprintCenter && slice.footprintSize) {
        return {
          center: slice.footprintCenter.clone(),
          size: slice.footprintSize.clone(),
        };
      }
      return { center: slice.center.clone(), size: slice.size.clone() };
    }

    function zoomToFloor(floorId, unitId = null) {
      const focus = unitId ? getUnitFocusPoint(floorId, unitId) : getFloorFocusPoint(floorId);
      if (!focus || !buildingBox) return;

      const { center, size } = focus;
      const target = new THREE.Vector3(center.x, center.y, center.z);
      const maxDim = Math.max(size.x, size.y, size.z);
      const dist = maxDim / (2 * Math.tan((camera.fov * Math.PI) / 360)) * 2.4;
      const offset = new THREE.Vector3(dist * 0.5, Math.max(dist * 0.32, size.y * 1.8), dist * 0.5);

      cameraAnim.fromTarget.copy(controls.target);
      cameraAnim.toTarget.copy(target);
      cameraAnim.fromPos.copy(camera.position);
      cameraAnim.toPos.copy(target.clone().add(offset));
      cameraAnim.startTime = performance.now();
      cameraAnim.active = true;
    }

    function resolveFloorFromHit(hit) {
      const y = hit.point.y;
      for (const slice of floorSlices) {
        if (y >= slice.yMin && y <= slice.yMax) return slice.id;
      }
      return null;
    }

    function resolveFloorFromId(floorId) {
      return floorSlices.find((s) => s.id === floorId) ? floorId : null;
    }

    // ── Raycaster double-click ──
    function onDoubleClick(event) {
      if (event.target !== renderer.domElement) return;
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(allMeshes, false);
      if (!hits.length) return;

      const floorId = resolveFloorFromHit(hits[0]);
      if (!floorId) return;
      selectFloor(floorId, { from3D: true, force: true });
    }

    renderer.domElement.addEventListener('dblclick', onDoubleClick);

    function alignModelToGround(object) {
      object.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      object.position.x += siteOffset.x - center.x;
      object.position.z += siteOffset.z - center.z;
      object.position.y += siteOffset.y - box.min.y;
      object.updateMatrixWorld(true);
    }

    function placeProp(factory, x, z, groundY, rotY = 0, scale = 1) {
      const prop = factory(scale);
      prop.position.set(x, groundY, z);
      prop.rotation.y = rotY;
      prop.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      return prop;
    }

    function addProp(group, object, x, z, groundY, rotY = 0) {
      object.position.set(x, groundY, z);
      object.rotation.y = rotY;
      object.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }

    function createBlockBuilding(width, depth, height, wallColor = 0xb8b0a4) {
      const group = new THREE.Group();
      const wallMat = new THREE.MeshStandardMaterial({ color: wallColor, roughness: 0.88, metalness: 0.04 });
      const winMat = new THREE.MeshStandardMaterial({ color: 0x7a8a98, roughness: 0.25, metalness: 0.25 });

      const body = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), wallMat);
      body.position.y = height / 2;
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const winW = 1.0;
      const winH = 1.25;
      const inset = 0.03;
      const rows = Math.min(5, Math.max(2, Math.floor(height / 3.0)));
      const colsW = Math.min(4, Math.max(2, Math.floor(width / 2.15)));
      const colsD = Math.min(4, Math.max(2, Math.floor(depth / 2.15)));
      const yStart = Math.max(1.6, height * 0.18);
      const yTop = height - 1.0;
      const yStep = rows > 1 ? (yTop - yStart) / (rows - 1) : 0;

      function addWindow(x, y, z, rotY) {
        const win = new THREE.Mesh(new THREE.PlaneGeometry(winW, winH), winMat);
        win.position.set(x, y, z);
        win.rotation.y = rotY;
        group.add(win);
      }

      function addFaceWindows(cols, span, face) {
        const margin = span * 0.18;
        const step = cols > 1 ? (span - margin * 2) / (cols - 1) : 0;
        for (let r = 0; r < rows; r++) {
          const y = yStart + r * yStep;
          for (let c = 0; c < cols; c++) {
            const u = -span / 2 + margin + c * step;
            if (face === 'front') addWindow(u, y, depth / 2 + inset, 0);
            if (face === 'back') addWindow(u, y, -depth / 2 - inset, Math.PI);
            if (face === 'right') addWindow(width / 2 + inset, y, u, Math.PI / 2);
            if (face === 'left') addWindow(-width / 2 - inset, y, u, -Math.PI / 2);
          }
        }
      }

      addFaceWindows(colsW, width, 'front');
      addFaceWindows(colsW, width, 'back');
      addFaceWindows(colsD, depth, 'right');
      addFaceWindows(colsD, depth, 'left');
      return group;
    }

    function addCrosswalk(group, x, z, width, depth, groundY, mat) {
      const stripeW = 0.55;
      const gap = 0.55;
      const count = Math.floor(depth / (stripeW + gap));
      for (let i = 0; i < count; i++) {
        group.add(
          addGroundPlane(stripeW, stripeW, mat, x, groundY - 0.007, z - depth / 2 + i * (stripeW + gap) + stripeW / 2)
        );
      }
    }

    function cityHash(i, j, seed = 0) {
      return Math.abs((i * 73856093) ^ (j * 19349663) ^ (seed * 83492791));
    }

    function isBlockTooCloseToHero(i, j, heroW, heroD, cellW, cellD, blockW, blockD, buildScale) {
      if (i === 0 && j === 0) return true;
      const heroHalfW = (heroW + 7) / 2 + 4;
      const heroHalfD = (heroD + 7) / 2 + 4;
      const buildHalf = Math.max(blockW * buildScale, blockD * buildScale) * 0.5;
      const dx = Math.abs(i * cellW);
      const dz = Math.abs(j * cellD);
      return dx < heroHalfW + buildHalf && dz < heroHalfD + buildHalf;
    }

    function isHeroFrontBlock(i, j) {
      return j === 1 && i >= -1 && i <= 1;
    }

    function isHeroClearZone(i, j, heroW, heroD, cellW, cellD, blockW, blockD, buildScale) {
      return isBlockTooCloseToHero(i, j, heroW, heroD, cellW, cellD, blockW, blockD, buildScale)
        || isHeroFrontBlock(i, j);
    }

    function buildCityGrid(envGroup, cx, cz, groundY, heroW, heroD, materials) {
      const { asphaltMat, sidewalkMat, lineMat, grassTex } = materials;
      const roadW = 13;
      const blockW = 24;
      const blockD = 24;
      const cellW = blockW + roadW;
      const cellD = blockD + roadW;
      const buildScale = 0.46;
      const gridN = 5;
      const cityExtent = (gridN + 2) * Math.max(cellW, cellD);
      const carColors = [0x2a4a6a, 0x8a2a2a, 0xdddddd, 0x2a2a2a, 0x5a6a4a, 0x4a3a6a, 0x6a5a3a, 0x3a5a6a];
      const blockColors = [0xc4bdb2, 0xa8a296, 0xb9b0a0, 0x9ea89a, 0xbeb5a8, 0x8f9690, 0xada496, 0x7a8a90];

      const ground = new THREE.Mesh(
        new THREE.CircleGeometry(cityExtent * 1.15, 72),
        new THREE.MeshStandardMaterial({
          map: grassTex,
          roughness: 0.92,
          metalness: 0.0,
          color: 0xa8c878,
        })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.set(cx, groundY - 0.02, cz);
      ground.receiveShadow = true;
      envGroup.add(ground);

      for (let j = -gridN - 1; j <= gridN + 1; j++) {
        const z = cz + j * cellD;
        envGroup.add(addGroundPlane(cityExtent * 2.2, roadW, asphaltMat, cx, groundY - 0.012, z));
        if (j % 2 === 0) {
          for (let x = cx - cityExtent; x < cx + cityExtent; x += 5) {
            envGroup.add(addGroundPlane(2.0, 0.16, lineMat, x + 1, groundY - 0.008, z));
          }
        }
      }
      for (let i = -gridN - 1; i <= gridN + 1; i++) {
        const x = cx + i * cellW;
        envGroup.add(addGroundPlane(roadW, cityExtent * 2.2, asphaltMat, x, groundY - 0.012, cz));
      }

      for (let j = -gridN; j <= gridN; j++) {
        for (let i = -gridN; i <= gridN; i++) {
          const blockCx = cx + i * cellW;
          const blockCz = cz + j * cellD;
          const h = cityHash(i, j);

          if (i === 0 && j === 0) {
            const swW = heroW + 7;
            const swD = heroD + 7;
            envGroup.add(addGroundPlane(swW, swD, sidewalkMat, blockCx, groundY - 0.005, blockCz));
            addCrosswalk(envGroup, blockCx, blockCz + swD / 2 + roadW / 2, 4.5, 3.2, groundY, lineMat);
            addCrosswalk(envGroup, blockCx, blockCz - swD / 2 - roadW / 2, 4.5, 3.2, groundY, lineMat);
            addCrosswalk(envGroup, blockCx - swW / 2 - roadW / 2, blockCz, 4.5, 3.2, groundY, lineMat);
            addCrosswalk(envGroup, blockCx + swW / 2 + roadW / 2, blockCz, 4.5, 3.2, groundY, lineMat);
            continue;
          }

          if (isHeroClearZone(i, j, heroW, heroD, cellW, cellD, blockW, blockD, buildScale)) {
            if (isHeroFrontBlock(i, j)) {
              envGroup.add(addGroundPlane(blockW * 0.96, blockD * 0.96, asphaltMat, blockCx, groundY - 0.012, blockCz));
              for (let lx = blockCx - blockW * 0.42; lx < blockCx + blockW * 0.42; lx += 4.8) {
                envGroup.add(addGroundPlane(2.0, 0.16, lineMat, lx + 1, groundY - 0.008, blockCz));
              }
            } else {
              envGroup.add(addGroundPlane(blockW * 0.72, blockD * 0.72, sidewalkMat, blockCx, groundY - 0.006, blockCz));
              const bufR = blockW * 0.18;
              [
                [blockCx - bufR, blockCz - bufR],
                [blockCx + bufR, blockCz + bufR],
                [blockCx, blockCz],
              ].forEach(([tx, tz], idx) => {
                envGroup.add(placeProp(createTree, tx, tz, groundY, idx * 0.8, 0.68));
              });
            }
            continue;
          }

          if (h % 11 === 0) {
            envGroup.add(addGroundPlane(blockW * 0.78, blockD * 0.78, sidewalkMat, blockCx, groundY - 0.006, blockCz));
            const parkR = blockW * 0.22;
            const spots = [
              [blockCx - parkR, blockCz - parkR], [blockCx + parkR, blockCz - parkR],
              [blockCx - parkR, blockCz + parkR], [blockCx + parkR, blockCz + parkR],
              [blockCx, blockCz],
            ];
            spots.forEach(([tx, tz], idx) => {
              envGroup.add(placeProp(createTree, tx, tz, groundY, idx * 0.7, 0.7 + (h % 5) * 0.04));
            });
            if (h % 22 === 0) addProp(envGroup, createBench(), blockCx, blockCz + parkR, groundY, 0);
            continue;
          }

          if (h % 5 === 0) {
            const subW = blockW * buildScale * 0.42;
            const subD = blockD * buildScale * 0.42;
            const gap = 3.2;
            const offsets = [
              [-subW / 2 - gap / 2, -subD / 2 - gap / 2], [subW / 2 + gap / 2, -subD / 2 - gap / 2],
              [-subW / 2 - gap / 2, subD / 2 + gap / 2], [subW / 2 + gap / 2, subD / 2 + gap / 2],
            ];
            offsets.forEach(([ox, oz], idx) => {
              const bh = 4 + cityHash(i, j, idx + 1) % 6;
              addProp(
                envGroup,
                createBlockBuilding(subW, subD, bh, blockColors[cityHash(i, j, idx) % blockColors.length]),
                blockCx + ox,
                blockCz + oz,
                groundY,
                (cityHash(i, j, idx) % 4) * (Math.PI / 2)
              );
            });
            continue;
          }

          const height = 5 + h % 7;
          addProp(
            envGroup,
            createBlockBuilding(blockW * buildScale * 0.82, blockD * buildScale * 0.82, height, blockColors[h % blockColors.length]),
            blockCx,
            blockCz,
            groundY,
            (h % 4) * (Math.PI / 2)
          );
        }
      }

      for (let j = -gridN - 1; j <= gridN + 1; j++) {
        for (let i = -gridN - 1; i <= gridN + 1; i++) {
          const ix = cx + i * cellW;
          const iz = cz + j * cellD;
          const h = cityHash(i, j, 99);
          addProp(envGroup, createLamppost(), ix, iz, groundY, (h % 4) * (Math.PI / 2));
          if (h % 3 === 0) addCrosswalk(envGroup, ix, iz, 3.8, 2.8, groundY, lineMat);
        }
      }

      for (let j = -gridN - 1; j <= gridN + 1; j++) {
        const z = cz + j * cellD;
        for (let k = -gridN * 2; k <= gridN * 2; k++) {
          if (cityHash(k, j, 7) % 3 !== 0) continue;
          const x = cx + k * (roadW + 4.5);
          addProp(envGroup, createCar(carColors[cityHash(k, j, 3) % carColors.length]), x, z + 2.6, groundY, Math.PI / 2);
          if (cityHash(k, j, 8) % 2 === 0) {
            addProp(envGroup, createCar(carColors[cityHash(k, j, 4) % carColors.length]), x, z - 2.6, groundY, -Math.PI / 2);
          }
        }
      }

      for (let i = -gridN - 1; i <= gridN + 1; i++) {
        const x = cx + i * cellW;
        for (let k = -gridN * 2; k <= gridN * 2; k++) {
          if (cityHash(i, k, 11) % 4 !== 0) continue;
          const z = cz + k * (roadW + 4.5);
          addProp(envGroup, createCar(carColors[cityHash(i, k, 5) % carColors.length]), x + 2.6, z, groundY, 0);
        }
      }

      for (let j = -gridN; j <= gridN; j++) {
        for (let i = -gridN; i <= gridN; i++) {
          if (i === 0 && j === 0) continue;
          if (isHeroClearZone(i, j, heroW, heroD, cellW, cellD, blockW, blockD, buildScale)) continue;
          const blockCx = cx + i * cellW;
          const blockCz = cz + j * cellD;
          const h = cityHash(i, j, 20);
          const propR = blockW * 0.38;
          if (h % 4 === 0) addProp(envGroup, createPlanter(), blockCx - propR, blockCz + propR * 0.6, groundY, 0);
          if (h % 5 === 1) addProp(envGroup, createTrashBin(), blockCx + propR, blockCz - propR * 0.6, groundY, 1);
          if (h % 6 === 2) addProp(envGroup, createBench(), blockCx - propR, blockCz, groundY, Math.PI / 2);
          if (h % 7 === 3) addProp(envGroup, createBollard(), blockCx + propR, blockCz + propR, groundY);
          if (h % 9 === 0) {
            envGroup.add(placeProp(createTree, blockCx + propR, blockCz - propR, groundY, h * 0.1, 0.72 + (h % 4) * 0.04));
          }
          if (h % 13 === 0) {
            addProp(envGroup, createBusStop(), blockCx + propR, blockCz, groundY, -Math.PI / 2);
          }
        }
      }

      return cityExtent;
    }

    // ── Model loading ──
    function setupEnvironment(object) {
      return loadTexture(
        'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/terrain/grasslight-big.jpg'
      ).then((grassTex) => {
        const box = new THREE.Box3().setFromObject(object);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const groundY = box.min.y;
        const cx = center.x;
        const cz = center.z;
        const footW = size.x;
        const footD = size.z;

        grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
        grassTex.repeat.set(40, 40);
        grassTex.colorSpace = THREE.SRGBColorSpace;

        const envGroup = new THREE.Group();
        scene.add(envGroup);

        const asphaltMat = new THREE.MeshStandardMaterial({
          color: 0x3a3a3a,
          roughness: 0.93,
          metalness: 0.04,
        });
        const sidewalkMat = new THREE.MeshStandardMaterial({
          color: 0xc8c2b6,
          roughness: 0.86,
          metalness: 0.02,
        });
        const lineMat = new THREE.MeshStandardMaterial({ color: 0xe8e8e8, roughness: 0.95 });

        const cityExtent = buildCityGrid(envGroup, cx, cz, groundY, footW, footD, {
          asphaltMat,
          sidewalkMat,
          curbMat: null,
          lineMat,
          grassTex,
        });

        scene.fog = new THREE.Fog(0xb8d4e8, size.y * 2.5, cityExtent * 1.35);
        object.userData.cityExtent = cityExtent;
      });
    }

    function frameModel(object) {
      const box = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const dist = maxDim / (2 * Math.tan((camera.fov * Math.PI) / 360)) * 1.35;

      controls.target.copy(center);
      camera.position.copy(center).add(new THREE.Vector3(dist * 0.55, dist * 0.42, dist * 0.82));
      controls.minDistance = maxDim * 0.08;
      controls.maxDistance = Math.max(maxDim * 6, (object.userData.cityExtent || maxDim) * 2.2);
      camera.near = maxDim / 200;
      camera.far = Math.max(maxDim * 20, (object.userData.cityExtent || maxDim) * 4);
      camera.updateProjectionMatrix();
      controls.update();
      homeView.target.copy(controls.target);
      homeView.position.copy(camera.position);
      homeView.saved = true;
    }

    function startIntroOrbit() {
      if (introOrbit.played) return;
      introOrbit.played = true;

      const offset = new THREE.Vector3().subVectors(camera.position, controls.target);
      introOrbit.radius = Math.hypot(offset.x, offset.z);
      introOrbit.height = offset.y;
      introOrbit.startAngle = Math.atan2(offset.x, offset.z);
      introOrbit.center.copy(controls.target);
      introOrbit.startTime = performance.now();
      introOrbit.active = true;
      controls.enabled = false;
    }

    function finishIntroOrbit() {
      if (!introOrbit.active) return;
      introOrbit.active = false;
      controls.enabled = true;
      homeView.target.copy(controls.target);
      homeView.position.copy(camera.position);
    }

    function updateIntroOrbit(now) {
      if (!introOrbit.active) return;

      const t = Math.min(1, (now - introOrbit.startTime) / introOrbit.duration);
      const e = easeInOutCubic(t);
      const angle = introOrbit.startAngle + introOrbit.deltaAngle * e;

      camera.position.set(
        introOrbit.center.x + Math.sin(angle) * introOrbit.radius,
        introOrbit.center.y + introOrbit.height,
        introOrbit.center.z + Math.cos(angle) * introOrbit.radius
      );

      if (t >= 1) finishIntroOrbit();
    }

    renderer.domElement.addEventListener('pointerdown', () => {
      if (introOrbit.active) finishIntroOrbit();
    });

    async function setupModel(gltf) {
      model = gltf.scene;

      model.traverse((child) => {
        if (!child.isMesh) return;
        child.castShadow = true;
        child.receiveShadow = true;

        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach((mat) => {
          if (!mat) return;
          mat.side = THREE.DoubleSide;
          if (mat.map) mat.map.colorSpace = THREE.SRGBColorSpace;
          if (mat.emissiveMap) mat.emissiveMap.colorSpace = THREE.SRGBColorSpace;
          if (mat.name === 'Red_Beam') {
            mat.emissive.set(0xb5935b);
            mat.emissiveIntensity = 0.28;
          }
          if (mat.alphaMode === 'BLEND') {
            mat.opacity = Math.max(mat.opacity ?? 1, 0.85);
            mat.transparent = true;
          } else {
            mat.opacity = 1;
            mat.transparent = false;
          }
          mat.depthWrite = true;
          mat.needsUpdate = true;
        });

        allMeshes.push(child);
        storeOriginalMaterial(child);
      });

      scene.add(highlightGroup);
      model.scale.setScalar(buildingScale);
      scene.add(model);
      alignModelToGround(model);

      setLoadingStatus('Building surroundings');
      await setupEnvironment(model);
      computeFloorSlices();
      frameModel(model);

      setLoadingStatus('Finishing scene');
      if (cloudLayer) scene.remove(cloudLayer);
      const cloudBox = new THREE.Box3().setFromObject(model);
      const cloudCenter = cloudBox.getCenter(new THREE.Vector3());
      const cloudExtent = model.userData.cityExtent || Math.max(cloudBox.getSize(new THREE.Vector3()).x, cloudBox.getSize(new THREE.Vector3()).z);
      cloudLayer = createCloudLayer(cloudCenter.x, cloudCenter.z, cloudBox.min.y, cloudExtent);
      scene.add(cloudLayer);

      renderer.render(scene, camera);
      beginExperience();
    }

    // ── Mobile sidebar ──
    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('visible');
      sidebarToggle.textContent = '×';
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('visible');
      sidebarToggle.textContent = '☰';
    }

    sidebarToggle.addEventListener('click', () => {
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });
    overlay.addEventListener('click', closeSidebar);
    document.getElementById('close-unit').addEventListener('click', () => {
      unitPanel.classList.remove('visible');
      selectedUnitId = null;
      updateSidebarUI();
    });

    btnViewImages.addEventListener('click', openImagesModal);
    document.getElementById('close-images-modal').addEventListener('click', closeImagesModal);
    document.getElementById('images-modal-backdrop').addEventListener('click', closeImagesModal);
    document.getElementById('close-lightbox').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (lightbox.classList.contains('visible')) {
        closeLightbox();
        return;
      }
      if (imagesModal.classList.contains('visible')) closeImagesModal();
    });

    function handleEnquire() {
      let subject = 'Enquiry - Skyline Tower';
      if (selectedUnitId && selectedFloorId && buildingData) {
        const floor = buildingData.floors.find((f) => f.id === selectedFloorId);
        const unit = floor?.units.find((u) => u.id === selectedUnitId);
        if (unit) subject = `Enquiry - ${unit.name} (${floor.name})`;
      }
      window.location.href = `mailto:info@skylinetower.com?subject=${encodeURIComponent(subject)}`;
    }

    function handleExploreUnits() {
      if (window.innerWidth <= 768) {
        openSidebar();
      } else {
        floorListEl.querySelector('.floor-btn')?.focus();
        sidebar.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    document.querySelectorAll('.btn-enquire').forEach((btn) => {
      btn.addEventListener('click', handleEnquire);
    });
    document.getElementById('btn-explore').addEventListener('click', handleExploreUnits);

    function adjustZoom(factor) {
      cameraAnim.active = false;
      const offset = new THREE.Vector3().subVectors(camera.position, controls.target);
      const dist = offset.length();
      if (dist < 0.001) return;
      const newDist = THREE.MathUtils.clamp(dist * factor, controls.minDistance, controls.maxDistance);
      offset.multiplyScalar(newDist / dist);
      camera.position.copy(controls.target).add(offset);
      controls.update();
    }

    function resetView() {
      if (!homeView.saved) return;
      selectedFloorId = null;
      selectedUnitId = null;
      unitPanel.classList.remove('visible');
      setHeroVisible(true);
      updateSidebarUI();
      setHighlightTargets(null, null);
      cameraAnim.fromTarget.copy(controls.target);
      cameraAnim.fromPos.copy(camera.position);
      cameraAnim.toTarget.copy(homeView.target);
      cameraAnim.toPos.copy(homeView.position);
      cameraAnim.startTime = performance.now();
      cameraAnim.active = true;
    }

    document.getElementById('zoom-in').addEventListener('click', () => adjustZoom(0.82));
    document.getElementById('zoom-out').addEventListener('click', () => adjustZoom(1.22));
    document.getElementById('zoom-reset').addEventListener('click', resetView);

    document.getElementById('nav-units').addEventListener('click', (e) => {
      e.preventDefault();
      handleExploreUnits();
    });
    document.getElementById('nav-amenities').addEventListener('click', (e) => {
      e.preventDefault();
      if (selectedUnitId) return;
      const firstFloor = buildingData?.floors?.[0];
      const firstUnit = firstFloor?.units?.[0];
      if (firstFloor && firstUnit) selectUnit(firstFloor.id, firstUnit.id);
    });

    // ── Resize ──
    function onResize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    // ── Init ──
    async function init() {
      try {
        setLoadingStatus('Loading building data');
        await loadData();
        setLoadingStatus('Loading 3D model');
        await new Promise((resolve, reject) => {
          const loader = new GLTFLoader();
          loader.load(
            'model/torre_garten_tamano_real.glb',
            (gltf) => {
              setupModel(gltf).then(resolve).catch(reject);
            },
            (progress) => {
              if (progress.total) {
                const pct = Math.round((progress.loaded / progress.total) * 100);
                setLoadingStatus(`Loading 3D model ${pct}%`);
              }
            },
            reject
          );
        });
      } catch (err) {
        loadingEl.textContent = 'Failed to load model.';
        console.error(err);
      }
    }

    let lastTime = performance.now();

    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now();
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      if (cameraAnim.active) {
        const t = Math.min(1, (now - cameraAnim.startTime) / cameraAnim.duration);
        const e = easeInOutCubic(t);
        controls.target.lerpVectors(cameraAnim.fromTarget, cameraAnim.toTarget, e);
        camera.position.lerpVectors(cameraAnim.fromPos, cameraAnim.toPos, e);
        if (t >= 1) cameraAnim.active = false;
      } else {
        updateIntroOrbit(now);
      }

      updateHighlightAnimation(dt);
      updateClouds(now, dt);
      controls.update();
      renderer.render(scene, camera);
    }

    init();
    animate();
  </script>
</body>
</html>
